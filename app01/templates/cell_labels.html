{% extends 'layout.html' %}
{% load static %}

<head>
  <script>
    const csrfToken = '{{ csrf_token }}';  // Django 渲染的 CSRF token
  </script>
  <title>细胞识别</title>
</head>
{% block css %}
<style>
  .container {
    display: flex;
    justify-content: space-between;
    padding: 20px;
  }

  .image-box {
    width: 45%;
    height: 400px;
    border: 2px dashed #ccc;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #f8f8f8;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, background-color 0.3s;
  }

  .image-box:hover {
    border-color: #aaa;
    background-color: #f0f0f0;
  }

  .image-box img {
    max-height: 100%;
    max-width: 100%;
    object-fit: contain;
  }

  .upload-label {
    cursor: pointer;
    color: #888;
    font-size: 16px;
  }

  .controls {
    margin-top: 20px;
    display: flex;
    gap: 20px;
    align-items: center;
  }

  select, button {
    padding: 10px 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
    cursor: pointer;
    transition: background-color 0.3s;
  }

  button:hover {
    background-color: #007bff;
    color: white;
    border-color: #007bff;
  }

  /* 覆盖全屏的加载动画样式 */
  #loading-screen {
    position: fixed; /* 固定在屏幕上 */
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.8); /* 半透明背景 */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999; /* 确保覆盖所有内容 */
    visibility: hidden; /* 默认隐藏 */
  }

  .dot-spinner {
    --uib-size: 2.8rem;
    --uib-speed: .9s;
    --uib-color: #62dfcc;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    height: var(--uib-size);
    width: var(--uib-size);
  }

  .dot-spinner__dot {
    position: absolute;
    top: 0;
    left: 0;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    height: 100%;
    width: 100%;
  }

  .dot-spinner__dot::before {
    content: '';
    height: 20%;
    width: 20%;
    border-radius: 50%;
    background-color: var(--uib-color);
    transform: scale(0);
    opacity: 0.5;
    animation: pulse0112 calc(var(--uib-speed) * 1.111) ease-in-out infinite;
    box-shadow: 0 0 20px rgba(18, 31, 53, 0.3);
  }

  .dot-spinner__dot:nth-child(2) {
    transform: rotate(45deg);
  }

  .dot-spinner__dot:nth-child(2)::before {
    animation-delay: calc(var(--uib-speed) * -0.875);
  }

  .dot-spinner__dot:nth-child(3) {
    transform: rotate(90deg);
  }

  .dot-spinner__dot:nth-child(3)::before {
    animation-delay: calc(var(--uib-speed) * -0.75);
  }

  .dot-spinner__dot:nth-child(4) {
    transform: rotate(135deg);
  }

  .dot-spinner__dot:nth-child(4)::before {
    animation-delay: calc(var(--uib-speed) * -0.625);
  }

  .dot-spinner__dot:nth-child(5) {
    transform: rotate(180deg);
  }

  .dot-spinner__dot:nth-child(5)::before {
    animation-delay: calc(var(--uib-speed) * -0.5);
  }

  .dot-spinner__dot:nth-child(6) {
    transform: rotate(225deg);
  }

  .dot-spinner__dot:nth-child(6)::before {
    animation-delay: calc(var(--uib-speed) * -0.375);
  }

  .dot-spinner__dot:nth-child(7) {
    transform: rotate(270deg);
  }

  .dot-spinner__dot:nth-child(7)::before {
    animation-delay: calc(var(--uib-speed) * -0.25);
  }

  .dot-spinner__dot:nth-child(8) {
    transform: rotate(315deg);
  }

  .dot-spinner__dot:nth-child(8)::before {
    animation-delay: calc(var(--uib-speed) * -0.125);
  }

  @keyframes pulse0112 {
    0%,
    100% {
      transform: scale(0);
      opacity: 0.5;
    }

    50% {
      transform: scale(1);
      opacity: 1;
    }
  }
  
  /* 输入框和按钮的样式 */
.input-group {
    display: flex;
    gap: 10px;
}

.form-control {
    padding: 10px 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
    transition: background-color 0.3s;
}

.btn-primary {
    padding: 10px 15px;
    border-radius: 8px;
    background-color: #007bff;
    color: white;
    border: none;
    cursor: pointer;
    transition: background-color 0.3s;
}

.btn-primary:hover {
    background-color: #0056b3;
}


</style>
{% endblock %}

{% block content %}
<div id="loading-screen">
  <div class="dot-spinner" id="spinner">
    <div class="dot-spinner__dot"></div>
    <div class="dot-spinner__dot"></div>
    <div class="dot-spinner__dot"></div>
    <div class="dot-spinner__dot"></div>
    <div class="dot-spinner__dot"></div>
    <div class="dot-spinner__dot"></div>
    <div class="dot-spinner__dot"></div>
    <div class="dot-spinner__dot"></div>
  </div>
</div>

<div class="container">
  <div class="image-box" id="upload-preview">
    <label class="upload-label" for="image-upload">点击上传图片或拖拽到此</label>
    <input type="file" id="image-upload" name="image" accept="image/*" style="display:none">
  </div>
  <div class="image-box" id="output-preview">
    <span class="upload-label">识别后的图像将在此显示</span>
  </div>
</div>

<div class="controls">
  <div class="input-group mb-3">
    <input type="text" id="target-input" class="form-control" placeholder="请输入目标名称">
    <button id="detect-btn" class="btn btn-primary">开始识别</button>
  </div>
</div>
{% endblock %}

{% block js %}
<script>
  const uploadInput = document.getElementById('image-upload');
  const uploadPreview = document.getElementById('upload-preview');
  const outputPreview = document.getElementById('output-preview');
  const detectBtn = document.getElementById('detect-btn');
  const targetSelect = document.getElementById('target-select');
  const spinner = document.getElementById('spinner');
  const loadingScreen = document.getElementById('loading-screen');
  // 获取输入框的值
    const targetInput = document.getElementById('target-input');
    
    // 修改 detectBtn 的点击事件
    detectBtn.addEventListener('click', () => {
        if (!currentImageFile) {
            alert('请先上传图片');
            return;
        }
    
        const prompt = targetInput.value.trim(); // 获取输入框的值
        if (!prompt) {
            alert('请输入目标名称');
            return;
        }
    
        // 点击时禁用按钮
        detectBtn.disabled = true;
    
        // 显示 loading screen
        loadingScreen.style.visibility = 'visible';
    
        // 强制让浏览器渲染加载动画
        requestAnimationFrame(() => {
            const formData = new FormData();
            formData.append('image', currentImageFile);
            formData.append('prompt', prompt); // 使用输入框的值
    
            fetch('/cell/detect/', {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': csrfToken,  // 添加 CSRF token
                }
            })
            .then(response => response.blob())
            .then(blob => {
                const url = URL.createObjectURL(blob);
                outputPreview.innerHTML = `<img src="${url}" alt="识别图像">`;
            })
            .catch(error => {
                console.error(error);
                alert('识别失败');
            })
            .finally(() => {
                // 隐藏 loading screen
                loadingScreen.style.visibility = 'hidden';
                detectBtn.disabled = false;
            });
        });
    });

  let currentImageFile = null;

  // 获取 CSRF token
  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
  }

  const csrfToken = getCookie('csrftoken');  // 这里重新获取 CSRF token

  uploadPreview.addEventListener('click', () => uploadInput.click());

  uploadInput.addEventListener('change', () => {
    const file = uploadInput.files[0];
    if (file) {
      currentImageFile = file;
      const reader = new FileReader();
      reader.onload = e => {
        uploadPreview.innerHTML = `<img src="${e.target.result}" alt="上传图片">`;
      };
      reader.readAsDataURL(file);
    }
  });

  uploadPreview.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadPreview.style.borderColor = 'rgba(8,255,0,0.64)';
  });

  uploadPreview.addEventListener('dragleave', (e) => {
    uploadPreview.style.borderColor = '#ccc';
  });

  uploadPreview.addEventListener('drop', (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file) {
      currentImageFile = file;
      const reader = new FileReader();
      reader.onload = e => {
        uploadPreview.innerHTML = `<img src="${e.target.result}" alt="上传图片">`;
      };
      reader.readAsDataURL(file);
    }
  });

  detectBtn.addEventListener('click', () => {
    if (!currentImageFile) {
        alert('请先上传图片');
        return;
    }

    // 点击时禁用按钮
    detectBtn.disabled = true;

    // 显示 loading screen
    loadingScreen.style.visibility = 'visible';

    // 强制让浏览器渲染加载动画
    requestAnimationFrame(() => {
        const formData = new FormData();
        formData.append('image', currentImageFile);
        formData.append('prompt', targetSelect.value);

        fetch('/cell/detect/', {
            method: 'POST',
            body: formData,
            headers: {
                'X-CSRFToken': csrfToken,  // 添加 CSRF token
            }
        })
        .then(response => response.blob())
        .then(blob => {
            const url = URL.createObjectURL(blob);
            outputPreview.innerHTML = `<img src="${url}" alt="识别图像">`;
        })
        .catch(error => {
            console.error(error);
            alert('识别失败');
        })
        .finally(() => {
            // 隐藏 loading screen
            loadingScreen.style.visibility = 'hidden';
            detectBtn.disabled = false;
        });
    });
  });
</script>
{% endblock %}
