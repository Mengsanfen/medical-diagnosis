{% extends 'layout.html' %}
{% load static %}
{% block css %}
<style>
    :root {
        --primary-color: #4CAF50;
        --secondary-color: #2196F3;
        --accent-color: #FF9800;
    }

    body {
        font-family: 'Segoe UI', 微软雅黑, sans-serif;
        background: #fff;
    }

    /* 全屏宽度调整 */
    .full-width-section {
        width: 100%;
        max-width: 100%;
        padding-left: 15px;
        padding-right: 15px;
        margin-left: auto;
        margin-right: auto;
    }

    .hero-section {
        background: linear-gradient(rgba(76, 175, 80, 0.8), rgba(33, 150, 243, 0.8)),
                    url('https://source.unsplash.com/1600x900/?health') center/cover;
        color: white;
        padding: 120px 0;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .feature-card {
        transition: transform 0.3s;
        border: none;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .feature-card:hover {
        transform: translateY(-10px);
    }

    .health-tips {
        background: white;
        padding: 40px 15px; /* 调整左右间距 */
        margin-top: -80px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        border-radius: 0; /* 移除圆角 */
    }

    .cta-button {
        background: var(--primary-color);
        padding: 15px 40px;
        border-radius: 30px;
        color: white;
        transition: all 0.3s;
    }

    .cta-button:hover {
        background: var(--secondary-color);
        transform: scale(1.05);
    }

    .stat-number {
        font-size: 2.5rem;
        color: var(--secondary-color);
        font-weight: bold;
    }

    /* 移除容器最大宽度 */
    .container-fluid {
        max-width: 100%;
        padding-left: 15px;
        padding-right: 15px;
    }

    /* 调整行间距 */
    .no-gutters {
        --bs-gutter-x: 0;
        margin-right: 0;
        margin-left: 0;
    }
</style>
{% endblock %}

{% block content %}
<body>
    <!-- 主体内容 -->
    <main>
        <!-- 首屏大图 -->
        <section class="hero-section text-center full-width-section">
            <div class="container-fluid">
                <h1 class="display-4 mb-4">拥抱健康生活</h1>
                <p class="lead mb-4">每天一小步，健康一大步</p>
                <a href="#tips" class="cta-button text-decoration-none">立即开始</a>
            </div>
        </section>

        <!-- 健康统计 -->
        <section class="container-fluid py-5 full-width-section">
            <div class="row text-center no-gutters g-0">
                <div class="col-md-3">
                    <div class="feature-card p-4 bg-white m-2">  <!-- 添加m-2保持间距 -->
                        <div class="stat-number">80%</div>
                        <p>疾病可通过预防避免</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="feature-card p-4 bg-white m-2">
                        <div class="stat-number">30min</div>
                        <p>每日建议运动时间</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="feature-card p-4 bg-white m-2">
                        <div class="stat-number">5+</div>
                        <p>每日建议蔬果种类</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="feature-card p-4 bg-white m-2">
                        <div class="stat-number">8h</div>
                        <p>优质睡眠时间</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 健康贴士 -->
        <section id="tips" class="container-fluid health-tips full-width-section">
            <h2 class="text-center mb-5">健康生活小贴士</h2>
            <div class="row no-gutters g-0">
                <div class="col-md-4 px-2">  <!-- 添加左右间距 -->
                    <div class="card h-100 border-0">
                        <img src="{% static '/img/250406/sports.jpg'%}" class="card-img-top" alt="运动">
                        <div class="card-body">
                            <h5 class="card-title">坚持运动</h5>
                            <p class="card-text">每周至少150分钟中等强度有氧运动，保持身体活力</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 px-2">
                    <div class="card h-100 border-0">
                        <img src="{% static '/img/250406/veget.png' %}" class="card-img-top" alt="饮食">
                        <div class="card-body">
                            <h5 class="card-title">均衡饮食</h5>
                            <p class="card-text">多吃蔬菜水果，控制油盐摄入，保持饮食多样性</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 px-2">
                    <div class="card h-100 border-0">
                        <img src="{% static '/img/250406/sleep.png' %}" class="card-img-top" alt="睡眠">
                        <div class="card-body">
                            <h5 class="card-title">充足睡眠</h5>
                            <p class="card-text">保证7-9小时优质睡眠，建立规律的作息时间</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{% endblock %}
