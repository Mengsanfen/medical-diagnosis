{% extends 'layout.html' %}
{% load static %}
{% block css %}
<style>
    .med-card {
        background: rgba(255,255,255,0.98);
        border-radius: 15px;
        box-shadow: 0 4px 20px rgba(0,75,112,0.1);
        border: 1px solid rgba(58,159,212,0.1);
    }
    .upload-section {
        border: 2px dashed #3a9fd4;
        background: rgba(58,159,212,0.05);
        min-height: 380px;
    }
    .result-table {
        --bs-table-bg: rgba(242,249,255,0.8);
        --bs-table-striped-bg: rgba(232,244,255,0.6);
        border-radius: 10px;
        overflow: hidden;
    }
    .status-badge {
        padding: 8px 15px;
        border-radius: 20px;
        font-weight: 600;
        background: linear-gradient(45deg, #3a9fd4, #6c5ce7);
        color: white;
    }
    .instruction-box {
        background: rgba(242,249,255,0.9);
        border-left: 4px solid #3a9fd4;
        padding: 1.2rem;
        border-radius: 8px;
    }
    .gradient-btn {
        background: linear-gradient(45deg, #3a9fd4, #6c5ce7);
        color: white!important;
        border: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row g-4 justify-content-center">
        <!-- 上传区域 -->
        <div class="col-lg-6">
            <div class="med-card p-3 h-100">
                <h4 class="mb-4 text-primary">
                    <i class="bi bi-cloud-upload me-2"></i>
                    医学影像上传
                </h4>
                
                <div class="upload-section d-flex flex-column align-items-center justify-content-center p-4">
                    <img id="previewImage" src="{% static '/img/medmamba.png' %}" 
                         class="img-fluid rounded-3 mb-4" 
                         alt="影像预览"
                         style="max-height: 280px">
                    
                    <div class="w-100">
                        <input type="file" id="fileInput" 
                               class="form-control visually-hidden" 
                               onchange="previewFile()">
                        <label for="fileInput" class="btn gradient-btn w-100 mb-3">
                            <i class="bi bi-folder2-open me-2"></i>
                            选择医学影像文件
                        </label>
                        <button type="button" onclick="simulateAnalysis()" 
                                class="btn btn-light w-100 border">
                            <i class="bi bi-upload me-2"></i>
                            模拟诊断
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 结果区域 -->
        <div class="col-lg-6">
            <div class="med-card p-3 h-100">
                <h4 class="mb-4 text-primary">
                    <i class="bi bi-clipboard2-data me-2"></i>
                    模拟诊断报告
                </h4>

                <div class="result-table-wrapper">
                    <table class="table result-table">
                        <tbody>
                            <tr>
                                <th scope="row" style="width: 120px">病例名称</th>
                                <td id="caseName" class="text-muted">demo_case</td>
                            </tr>
                            <tr>
                                <th>置信度</th>
                                <td><span class="status-badge" id="confidence">--%</span></td>
                            </tr>
                            <tr>
                                <th>分类结果</th>
                                <td><span class="text-primary fw-bold" id="classification">--</span></td>
                            </tr>
                            <tr>
                                <th>诊断建议</th>
                                <td id="diagnosisTips" class="text-secondary">等待模拟分析...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="instruction-box mt-4">
                    <h6 class="text-primary mb-3">
                        <i class="bi bi-info-circle me-2"></i>
                        分类说明
                    </h6>
                    <ul class="list-unstyled">
                        <li><span class="badge bg-primary me-2">0</span> 正常组织</li>
                        <li><span class="badge bg-warning me-2">1</span> 锯齿状病变</li>
                        <li><span class="badge bg-danger me-2">2</span> 腺癌</li>
                        <li><span class="badge bg-success me-2">3</span> 腺瘤</li>
                    </ul>
                    <p class="text-muted small mt-2">

                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block js %}
<script>
    // 模拟数据生成器
    // 修改后的模拟数据生成器
    const generateMockData = () => {
        const classes = [
            {id: 0, name: '正常组织', tips: '未见异常特征', color: 'primary'},
            {id: 1, name: '锯齿状病变', tips: '检测到边缘不规则', color: 'warning'},
            {id: 2, name: '腺癌', tips: '发现恶性病变特征', color: 'danger'},
            {id: 3, name: '腺瘤', tips: '检测到良性肿瘤', color: 'success'}
        ];
        
        const randomClass = classes[Math.floor(Math.random() * classes.length)];
        return {
            confidence: (Math.random() * 14 + 85).toFixed(1) + '%', // 85-99%
            class: randomClass.id,
            className: randomClass.name,
            tips: randomClass.tips,
            color: randomClass.color
        };
    }


    // 模拟诊断分析
    function simulateAnalysis() {
        // 显示加载状态
        $('#diagnosisTips').text('分析中...').addClass('text-muted');
        
        // 模拟异步处理
        setTimeout(() => {
            const mockData = generateMockData();
            
            $('#confidence').text(mockData.confidence);
            $('#classification').html(`
                <span class="badge bg-${mockData.color}">${mockData.class}</span>
                ${mockData.className}
            `);
            $('#diagnosisTips').text(mockData.tips).removeClass('text-muted');
        }, 800);
    }

    // 文件预览功能
    function previewFile() {
        const file = document.getElementById('fileInput').files[0];
        const preview = document.getElementById('previewImage');
        const reader = new FileReader();

        reader.onloadend = () => {
            preview.src = reader.result;
            preview.style.display = 'block';
            $('#caseName').text(file.name || '未命名病例');
        }

        if (file) reader.readAsDataURL(file);
    }
</script>
{% endblock %}
